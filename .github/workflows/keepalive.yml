name: Keep Render Services Alive

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  ping:
    name: Ping services
    runs-on: ubuntu-latest
    steps:
      - name: Ping http-server
        run: |
          if [ -z "${{ secrets.HTTP_SERVER_URL }}" ]; then
            echo "HTTP_SERVER_URL secret not set, skipping"
            exit 0
          fi
          curl -sf "${{ secrets.HTTP_SERVER_URL }}/health" || echo "http-server unreachable"
      - name: Ping ws-server
        run: |
          if [ -z "${{ secrets.WS_SERVER_URL }}" ]; then
            echo "WS_SERVER_URL secret not set, skipping"
            exit 0
          fi
          curl -sf "${{ secrets.WS_SERVER_URL }}/health" || echo "ws-server unreachable"
