version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: dripl
      POSTGRES_PASSWORD: dripl
      POSTGRES_DB: dripl
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'

  ws-server:
    build:
      context: .
      dockerfile: apps/ws-server/Dockerfile
    ports:
      - '3001:3001'
    environment:
      - DATABASE_URL=postgresql://dripl:dripl@postgres:5432/dripl
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=${JWT_SECRET}
      - WS_PORT=3001
    depends_on:
      - postgres
      - redis

  http-server:
    build:
      context: .
      dockerfile: apps/http-server/Dockerfile
    ports:
      - '3002:3002'
    environment:
      - DATABASE_URL=postgresql://dripl:dripl@postgres:5432/dripl
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=${JWT_SECRET}
      - FRONTEND_URL=http://localhost:3000
      - PORT=3002
    depends_on:
      - postgres
      - redis

  dripl-app:
    build:
      context: .
      dockerfile: apps/dripl-app/Dockerfile
    ports:
      - '3000:3000'
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:3002/api
      - NEXT_PUBLIC_WS_URL=ws://localhost:3001
      - NEXT_PUBLIC_HTTP_URL=http://localhost:3002/api
    depends_on:
      - http-server
      - ws-server

volumes:
  postgres_data:
