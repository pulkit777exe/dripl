services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: dripl
      POSTGRES_PASSWORD: dripl
      POSTGRES_DB: dripl
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U dripl']
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 5

  ws-server:
    build:
      context: .
      dockerfile: docker/Dockerfile.ws-server
    ports:
      - '3001:3001'
    # Internal Docker network — use service name, not localhost
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://dripl:dripl@postgres:5432/dripl
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=${JWT_SECRET}
      - WS_PORT=3001
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://localhost:3001/health').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s

  http-server:
    build:
      context: .
      dockerfile: docker/Dockerfile.http-server
    ports:
      - '3002:3002'
    # Internal Docker network — use service name, not localhost
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://dripl:dripl@postgres:5432/dripl
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=${JWT_SECRET}
      - FRONTEND_URL=http://localhost:3000
      - PORT=3002
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://localhost:3002/health').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s

  dripl-app:
    build:
      context: .
      dockerfile: docker/Dockerfile.dripl-app
    ports:
      - '3000:3000'
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=http://localhost:3002/api
      - NEXT_PUBLIC_WS_URL=ws://localhost:3001
      - NEXT_PUBLIC_HTTP_URL=http://localhost:3002/api
    depends_on:
      http-server:
        condition: service_healthy
      ws-server:
        condition: service_healthy

volumes:
  postgres_data:
