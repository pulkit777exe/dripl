services:
  - type: web
    name: dripl-http-server
    env: node
    rootDir: apps/http-server
    buildCommand: cd ../.. && pnpm install --frozen-lockfile && pnpm --filter @dripl/db db:generate && pnpm turbo run build --filter=http-server
    startCommand: node dist/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: '10000'
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: INTERNAL_SECRET
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: NEXT_PUBLIC_APP_URL
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: UPSTASH_REDIS_REST_URL
        sync: false
      - key: UPSTASH_REDIS_REST_TOKEN
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
    healthCheckPath: /health
    autoDeploy: true

  - type: web
    name: dripl-ws-server
    env: node
    rootDir: apps/ws-server
    buildCommand: cd ../.. && pnpm install --frozen-lockfile && pnpm --filter @dripl/db db:generate && pnpm turbo run build --filter=ws-server
    startCommand: node dist/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: '10000'
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: INTERNAL_SECRET
        sync: false
      - key: HTTP_SERVER_URL
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: UPSTASH_REDIS_REST_URL
        sync: false
      - key: UPSTASH_REDIS_REST_TOKEN
        sync: false
    healthCheckPath: /health
    autoDeploy: true
